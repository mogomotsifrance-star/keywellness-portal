  <circle cx="20" cy="22" r="2.2" fill="#808185"/>
  <circle cx="26" cy="16" r="2"   fill="#808185"/>
  <circle cx="34" cy="13" r="2"   fill="#808185"/>
  <circle cx="42" cy="16" r="2"   fill="#808185"/>
