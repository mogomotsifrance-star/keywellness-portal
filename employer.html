<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Key Wellness — Employer Dashboard</title>
<link rel="icon" type="image/svg+xml" href="assets/img/kw-icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/kw-theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/kw-reveal.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="kw-report-charts.js"></script>
<style>
:root{
  --navy:var(--kw-ink);--navy-light:var(--kw-green-deep);--gold:var(--kw-green);--gold-light:var(--kw-green-deep);
  --cream:var(--kw-canvas);--cream-dark:var(--kw-surface);--white:var(--kw-white);
  --green:var(--kw-green);--red:var(--kw-red);--orange:var(--kw-orange);--muted:var(--kw-grey);
  --teal:var(--kw-green);--text:var(--kw-body);--border:var(--kw-line);
  --radius:var(--kw-r-lg);--radius-sm:var(--kw-r);--shadow:0 1px 3px rgba(35,38,31,.06);--sidebar-w:240px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;display:flex}
button{cursor:pointer;font-family:'Nunito',sans-serif}
.mono{font-family:'DM Mono',monospace}

/* Sidebar */
#sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--kw-navy);display:flex;flex-direction:column;position:fixed;left:0;top:0;z-index:100}
.sb-logo{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo h1{color:#fff;font-size:14px;font-weight:800}
.sb-logo span{color:var(--kw-yellow);font-size:11px;font-weight:500;display:block;margin-top:2px}
.sb-org{padding:12px 20px;border-bottom:1px solid rgba(255,255,255,.08);font-size:12px;color:rgba(255,255,255,.5);line-height:1.6}
.sb-org strong{color:rgba(255,255,255,.85);display:block;font-size:13px;margin-bottom:1px}
.sb-nav{flex:1;padding:14px 12px}
.sb-item{display:flex;align-items:center;gap:12px;padding:10px 14px;margin-bottom:2px;border-radius:999px;color:rgba(255,255,255,.65);font-size:13px;font-weight:700;transition:background-color .2s var(--kw-ease),color .2s var(--kw-ease)}
.sb-item:hover{color:#fff;background:rgba(255,255,255,.08)}
.sb-item.active{color:var(--kw-green);background:var(--white);box-shadow:0 1px 4px rgba(0,0,0,.2)}
.sb-footer{padding:14px 20px;border-top:1px solid rgba(255,255,255,.1)}
.sb-user{color:rgba(255,255,255,.5);font-size:11px;margin-bottom:10px;word-break:break-all}
.sb-logout{background:transparent;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);font-size:11px;font-weight:700;padding:8px 12px;border-radius:999px;cursor:pointer;width:100%;transition:.15s}
.sb-logout:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.3);color:#fff}

/* Main */
#main{margin-left:var(--sidebar-w);flex:1;min-height:100vh}
.page-header{background:var(--white);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50}
.page-header h2{font-size:19px;font-weight:800;flex:1}
.page-content{padding:28px 32px}
.privacy-badge{display:inline-flex;align-items:center;gap:6px;background:var(--cream-dark);border:1px solid var(--border);border-radius:999px;padding:4px 12px;font-size:11px;color:var(--muted);font-weight:500;white-space:nowrap}

/* Cards */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:20px}
.card-title{font-size:14px;font-weight:800;margin-bottom:4px;color:var(--navy)}
.card-subtitle{font-size:12px;color:var(--muted);margin-bottom:18px;line-height:1.5}

/* Stat boxes */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.stat-box{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);transition:transform .3s var(--kw-ease),box-shadow .3s var(--kw-ease)}
.stat-box:hover{transform:translateY(-3px);box-shadow:var(--kw-shadow-hover)}
.stat-val{font-family:'DM Mono',monospace;font-size:28px;font-weight:500;color:var(--navy)}
.stat-lbl{font-size:11px;font-weight:600;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.04em}
.stat-delta{font-size:11px;margin-top:6px;font-weight:600}
.stat-box.gold .stat-val{color:var(--kw-yellow-ink)}
.stat-box.green .stat-val{color:var(--green)}
.stat-box.orange .stat-val{color:var(--orange)}

/* Funnel */
.funnel-list{display:flex;flex-direction:column;gap:12px}
.funnel-step{display:flex;flex-direction:column;gap:5px}
.funnel-label-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600}
.funnel-count{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)}
.funnel-bar-bg{background:var(--cream-dark);border-radius:99px;height:10px;overflow:hidden}
.funnel-bar-fill{height:100%;border-radius:99px;transition:.5s}
.funnel-note{font-size:11px;color:var(--muted);margin-top:10px;font-style:italic}

/* Distribution */
.dist-bands{display:flex;border-radius:var(--radius-sm);overflow:hidden;height:32px;margin-bottom:12px}
.dist-band{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;min-width:0;overflow:hidden}
.dist-band.struggling{background:var(--red)}
.dist-band.coping{background:var(--orange)}
.dist-band.thriving{background:var(--green)}
.dist-legend{display:flex;gap:16px;flex-wrap:wrap}
.dist-leg-item{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500}
.dist-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Dimensions */
.dim-list{display:flex;flex-direction:column;gap:12px}
.dim-row{display:flex;align-items:center;gap:12px}
.dim-label-wrap{width:170px;flex-shrink:0;display:flex;align-items:center}
.dim-label{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dim-focus-tag{display:inline-block;background:var(--kw-yellow);color:var(--kw-yellow-ink);font-size:9px;font-weight:700;padding:1px 6px;border-radius:999px;margin-left:6px;vertical-align:middle;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
.dim-bar-bg{flex:1;background:var(--cream-dark);border-radius:999px;height:8px;overflow:hidden}
.dim-bar-fill{height:100%;border-radius:999px;background:var(--teal);transition:.5s}
.dim-bar-fill.focus{background:var(--kw-yellow)}
.dim-score{width:36px;text-align:right;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--muted)}

/* Distress */
.distress-band{background:var(--cream-dark);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 18px;display:flex;align-items:flex-start;gap:14px;margin-bottom:12px}
.distress-pct{font-family:'DM Mono',monospace;font-size:32px;font-weight:500;color:var(--orange);flex-shrink:0;line-height:1.1}
.distress-desc{font-size:13px;color:var(--text);line-height:1.6}

/* Actions */
.action-strip{background:var(--kw-navy);border-radius:var(--radius);padding:24px;color:#fff;margin-bottom:20px}
.action-strip h3{font-size:16px;font-weight:800;margin-bottom:6px}
.action-strip p{font-size:13px;color:rgba(255,255,255,.75);margin-bottom:18px;line-height:1.6}
.action-btns{display:flex;gap:12px;flex-wrap:wrap}
.btn-action{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:13px;font-weight:700;padding:9px 18px;border-radius:999px;cursor:pointer;transition:.15s}
.btn-action:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.4)}
.btn-action.primary{background:var(--kw-green);border-color:var(--kw-green);color:#fff}
.btn-action.primary:hover{background:var(--kw-green-deep)}
/* .btn-action is designed for the dark .action-strip background — on a white
   .card, its default rgba(255,255,255,.12) fill is nearly invisible. .on-light
   gives it navy-on-white contrast instead, used for the Rewards tab's Reward
   buttons and Categories/History sub-tab toggles. */
.btn-action.on-light{background:var(--white);border-color:var(--border);color:var(--navy)}
.btn-action.on-light:hover{border-color:var(--kw-grey)}
.btn-action.on-light.primary{background:var(--kw-green);border-color:var(--kw-green);color:#fff}
.btn-action.on-light.primary:hover{background:var(--kw-green-deep)}

/* Chart */
.chart-wrap{position:relative;height:220px}
.trend-caption{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5;font-style:italic}

/* Financial indicator bands (Debt Health / Retirement Readiness) */
.fin-bands{display:flex;border-radius:var(--radius-sm);overflow:hidden;height:32px;margin-bottom:12px}
.fin-band{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;min-width:0;overflow:hidden}
.fin-band.suppressed{background:var(--border);color:var(--muted);font-size:12px}
.fin-legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px}
.fin-leg-item{display:flex;align-items:center;gap:6px}
.fin-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Rewards table */
.rewards-table{width:100%;border-collapse:collapse;font-size:13px}
.rewards-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);padding:8px 10px;border-bottom:2px solid var(--border)}
.rewards-table td{padding:10px;border-bottom:1px solid var(--border)}
.rewards-table tr:last-child td{border-bottom:none}

/* Spinner */
.spinner{display:flex;align-items:center;justify-content:center;padding:80px;color:var(--muted);font-size:14px;gap:10px}
.spin{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--kw-green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Empty state */
.empty-state{text-align:center;padding:64px 32px;max-width:480px;margin:0 auto}
.empty-state h3{font-size:18px;font-weight:800;margin-bottom:10px}
.empty-state p{font-size:14px;color:var(--muted);line-height:1.6}
.empty-icon{font-size:48px;margin-bottom:16px}
.notice-gold{background:var(--kw-yellow-tint);border:1px solid var(--kw-yellow);color:var(--kw-yellow-ink);padding:12px 16px;border-radius:var(--radius-sm);font-size:13px;margin-top:16px;text-align:left;line-height:1.5}

@media(max-width:768px){
  #sidebar{display:none}
  #main{margin-left:0}
  .page-content{padding:16px}
  .page-header{padding:14px 16px}
  .dim-label-wrap{width:120px}
}

/* Reports */
.report-status-published{background:var(--kw-green-tint);color:var(--kw-green-deep)}
.chart-box{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:16px;min-width:0}
.chart-box h4{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}
.chart-canvas-wrap{position:relative;height:220px;width:100%}
.chart-canvas-wrap canvas{max-width:100%}
.report-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;min-width:0}
@media (max-width:900px){.report-grid{grid-template-columns:1fr}}
.suppression-note{font-size:11px;color:var(--muted);margin-top:6px;font-style:italic}
.severity-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;text-transform:uppercase}
.severity-high{background:#fdf2f2;color:var(--red)}
.severity-medium{background:#fff8f0;color:var(--orange)}
.severity-low{background:var(--kw-green-tint);color:var(--kw-green-deep)}
.risk-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px}
.risk-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);padding:8px 10px;border-bottom:2px solid var(--border)}
.risk-table td{padding:10px;border-bottom:1px solid var(--border);vertical-align:top}
.narrative-text{font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap}
.chart-caption{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.5}

/* ── International-grade report: cover, sections, KPI strip, appendix ── */
.report-doc{max-width:840px;margin:0 auto}
.report-cover{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:48px 40px;margin-bottom:24px;text-align:center}
.report-cover-brandbar{height:4px;width:64px;background:var(--kw-green);border-radius:2px;margin:0 auto 28px}
.report-cover h1{font-size:26px;font-weight:800;color:var(--navy);margin-bottom:6px;letter-spacing:-.01em}
.report-cover .report-cover-sub{font-size:14px;color:var(--muted);margin-bottom:32px}
.report-cover-meta{display:flex;justify-content:center;gap:40px;flex-wrap:wrap;margin-top:8px}
.report-cover-meta div{text-align:left}
.report-cover-meta .meta-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:3px}
.report-cover-meta .meta-val{font-size:14px;font-weight:700;color:var(--navy)}
.report-section{margin-bottom:24px}
.report-section-title{font-size:17px;font-weight:800;color:var(--navy);margin-bottom:4px;padding-bottom:10px;border-bottom:2px solid var(--kw-green)}
.report-section-sub{font-size:12px;color:var(--muted);margin:8px 0 16px;line-height:1.6}
.report-kpi-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:8px}
.report-appendix{background:var(--cream-dark);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
.report-appendix h4{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--navy);margin:16px 0 6px}
.report-appendix h4:first-child{margin-top:0}
.report-appendix p,.report-appendix li{font-size:12px;color:var(--text);line-height:1.7}
.report-appendix ul{margin-left:18px}
.confidentiality-line{font-size:12px;color:var(--muted);font-style:italic;margin-top:14px;line-height:1.6}

@media print {
  #sidebar, .page-header .privacy-badge, .report-list-link, .btn-outline { display:none !important; }
  #main { margin-left:0 !important; }
  .page-content { padding:0 !important; }
  .card { break-inside:avoid; page-break-inside:avoid; box-shadow:none; border:1px solid #ccc; }
  body { background:#fff; }
  .report-cover { page-break-after: always; border:none; }
  .report-section { break-inside: avoid; page-break-inside: avoid; }
  .chart-box { break-inside: avoid; page-break-inside: avoid; }
  .report-appendix { break-before: page; page-break-before: always; }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="sb-logo">
    <h1>KEY WELLNESS</h1>
    <span>Employer Dashboard</span>
  </div>
  <div class="sb-org" id="sb-org-name">Loading&hellip;</div>
  <div class="sb-nav">
    <div class="sb-item active" id="nav-overview" onclick="switchTab('overview')">&#128202; Wellbeing Overview</div>
    <div class="sb-item" id="nav-rewards" onclick="switchTab('rewards')">&#127942; Rewards</div>
    <div class="sb-item" id="nav-reports" onclick="switchTab('reports')">&#128196; Reports</div>
  </div>
  <div class="sb-footer">
    <div class="sb-user" id="sb-user-email"></div>
    <button class="sb-logout" onclick="doLogout()">Sign Out</button>
  </div>
</nav>

<!-- MAIN -->
<div id="main">
  <div class="page-header">
    <h2 id="page-org-title">Workforce Wellbeing Overview</h2>
    <span class="privacy-badge">&#128274; Aggregate only &middot; min 5 per group</span>
  </div>
  <div class="page-content" id="page-content">
    <div class="spinner"><div class="spin"></div> Loading your dashboard&hellip;</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://tarmpqxsabbehgjaonfz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhcm1wcXhzYWJiZWhnamFvbmZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MjA2MjQsImV4cCI6MjA5NzA5NjYyNH0.Em-NvJVY_geHk6UOTxnpINgUw669V8W_9YvAi_koX9U';
const { createClient } = window.supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// UI convenience flag only — never a security boundary.
// All access control is enforced by RLS and the org_overview() RPC.
window._isEmployer = false;

let trendChart = null;
let currentOrgName = 'Your Organisation';

const DIM_LABELS = {
  income:     'Income & Cash Flow',
  savings:    'Savings Rate',
  emergency:  'Emergency Fund',
  debt:       'Debt Management',
  retirement: 'Retirement Readiness',
  insurance:  'Risk Protection',
  goals:      'Financial Goals',
  spending:   'Spending & Net Worth',
};

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function scoreBandColor(score) {
  if (score >= 65) return 'var(--green)';
  if (score >= 40) return 'var(--orange)';
  return 'var(--red)';
}
function scoreBandLabel(score) {
  if (score >= 65) return 'Thriving';
  if (score >= 40) return 'Coping';
  return 'Struggling';
}

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.replace('index.html'); return; }

  const user = session.user;
  document.getElementById('sb-user-email').textContent = user.email || '';

  // Verify caller is employer or admin — otherwise send them back to the member portal.
  // Employer lookup mirrors employer_org(): match by user_id OR email, since
  // employers added by email before their first login won't have user_id set
  // until the signup backfill trigger fires (existing accounts never get it).
  const [empRes, adminRes] = await Promise.all([
    sb.from('employers').select('org_id').or(`user_id.eq.${user.id},email.eq.${user.email.toLowerCase()}`).maybeSingle(),
    sb.from('admins').select('email').eq('email', user.email).maybeSingle(),
  ]);

  const isEmployer = !!empRes.data;
  const isAdmin    = !!adminRes.data;

  if (!isEmployer && !isAdmin) {
    window.location.replace('index.html');
    return;
  }

  window._isEmployer = isEmployer;

  // Load org name (allowed by orgs_own RLS for the employer's own org).
  if (isEmployer && empRes.data && empRes.data.org_id) {
    const { data: orgRow } = await sb
      .from('organizations')
      .select('name')
      .eq('id', empRes.data.org_id)
      .maybeSingle();
    if (orgRow && orgRow.name) {
      currentOrgName = orgRow.name;
      document.getElementById('sb-org-name').innerHTML =
        '<strong>' + escHtml(orgRow.name) + '</strong>HR / Employer view';
      document.getElementById('page-org-title').textContent =
        orgRow.name + ' — Wellbeing Overview';
    }
  } else if (isAdmin) {
    document.getElementById('sb-org-name').innerHTML =
      '<strong>Admin</strong>Viewing as administrator';
  }

  // Call both RPCs with no argument — employer_org() resolves their org
  // server-side for each. Financial indicators failing shouldn't block the
  // rest of the dashboard, so it's handled separately from org_overview.
  const [overviewRes, finRes] = await Promise.all([
    sb.rpc('org_overview'),
    sb.rpc('org_financial_indicators'),
  ]);

  if (overviewRes.error) {
    renderError(overviewRes.error.message);
    return;
  }
  if (finRes.error) console.error('org_financial_indicators failed:', finRes.error);

  window._overviewData = overviewRes.data;
  window._finData = finRes.error ? null : finRes.data;

  render(window._overviewData);
  KW.reveal('.card, .stat-box');
}

// Quarter key matching the server's to_char(now(),'YYYY"-Q"Q'), e.g. "2026-Q3".
// offset=1 means "one quarter ago".
function quarterKey(offset) {
  var d = new Date();
  var q = Math.floor(d.getMonth() / 3) + 1;
  var y = d.getFullYear();
  q -= (offset || 0);
  while (q < 1) { q += 4; y -= 1; }
  return y + '-Q' + q;
}

let rewardsSeason = null;
let rewardsRows = [];
let rewardsSummary = null;
let rewardsSubTab = 'categories'; // 'categories' | 'history'
let guidanceOpen = false;
let openRewardForm = null;        // { category, userId } | null
let belowSectionsOpen = { utilisation: false, learning: false, progress: false };
let historyRows = [];
let historySeason = '';           // '' = all seasons
let historyLoaded = false;
let headcountEditing = false;

async function switchTab(tab) {
  document.getElementById('nav-overview').classList.toggle('active', tab === 'overview');
  document.getElementById('nav-rewards').classList.toggle('active', tab === 'rewards');
  document.getElementById('nav-reports').classList.toggle('active', tab === 'reports');
  if (tab === 'overview') {
    render(window._overviewData);
  } else if (tab === 'reports') {
    await loadReports();
  } else {
    await loadRewards(rewardsSeason || quarterKey(0));
  }
  KW.reveal('.card, .stat-box');
}

async function loadRewards(season) {
  rewardsSeason = season;
  rewardsSubTab = 'categories';
  openRewardForm = null;
  historyLoaded = false;
  document.getElementById('page-content').innerHTML = '<div class="spinner"><div class="spin"></div> Loading rewards&hellip;</div>';
  const [rewardsRes, summaryRes] = await Promise.all([
    sb.rpc('org_rewards', { p_season: season }),
    sb.rpc('org_rewards_summary', { p_season: season }),
  ]);
  if (rewardsRes.error) {
    renderError(rewardsRes.error.message);
    return;
  }
  if (summaryRes.error) console.error('org_rewards_summary failed:', summaryRes.error);
  rewardsRows = rewardsRes.data || [];
  rewardsSummary = summaryRes.error ? null : summaryRes.data;
  renderRewards();
}

async function switchRewardsSubTab(tab) {
  rewardsSubTab = tab;
  if (tab === 'history' && !historyLoaded) {
    await loadHistory(historySeason);
  } else {
    renderRewards();
  }
}

async function loadHistory(season) {
  historySeason = season || '';
  const { data, error } = await sb.rpc('org_reward_history', { p_season: historySeason || null });
  if (error) { console.error('org_reward_history failed:', error); historyRows = []; }
  else { historyRows = data || []; historyLoaded = true; }
  renderRewards();
}

function toggleBelowBar(category) {
  belowSectionsOpen[category] = !belowSectionsOpen[category];
  renderRewards();
}

function toggleRewardForm(category, userId) {
  openRewardForm = (openRewardForm && openRewardForm.category === category && openRewardForm.userId === userId)
    ? null
    : { category: category, userId: userId };
  renderRewards();
}

async function confirmReward(category, userId) {
  const noteEl = document.getElementById('reward-note-' + category + '-' + userId);
  const errEl  = document.getElementById('reward-error-' + category + '-' + userId);
  const note = (noteEl && noteEl.value || '').trim();
  if (errEl) errEl.textContent = '';

  const { error } = await sb.rpc('record_reward_fulfilment', {
    p_user_id: userId, p_season: rewardsSeason, p_category: category, p_note: note || null,
  });
  if (error) {
    if (errEl) errEl.textContent = error.message;
    return;
  }
  openRewardForm = null;
  // Patch local state so the row flips to "Rewarded" without a full reload.
  const row = rewardsRows.find(function (m) { return m.user_id === userId; });
  if (row) {
    row.rewarded_categories = row.rewarded_categories || [];
    if (row.rewarded_categories.indexOf(category) === -1) row.rewarded_categories.push(category);
    row.rewarded_notes = row.rewarded_notes || {};
    row.rewarded_notes[category] = note;
  }
  renderRewards();
}

function rewardButtonHtml(category, userId, rewardedCategories, noteText) {
  if ((rewardedCategories || []).indexOf(category) !== -1) {
    return '<span style="font-size:12px;color:var(--green);font-weight:600;white-space:nowrap">&#10003; Rewarded' + (noteText ? ' &mdash; ' + escHtml(noteText) : '') + '</span>';
  }
  return '<button class="btn-action on-light" style="padding:6px 14px;font-size:12px" onclick="toggleRewardForm(\'' + category + '\',\'' + userId + '\')">Reward</button>';
}

function rewardFormHtml(category, userId, placeholder) {
  return '<div class="card" style="margin:-2px 0 10px;padding:14px 18px;background:#fffbf2;border:1px solid #f0d88e">'
    + '<label style="font-size:12px;font-weight:600;color:var(--navy);display:block;margin-bottom:6px">What was awarded?</label>'
    + '<div style="display:flex;gap:8px;flex-wrap:wrap">'
    + '<input type="text" id="reward-note-' + category + '-' + userId + '" maxlength="200" placeholder="' + placeholder + '" style="flex:1;min-width:180px;padding:8px 10px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:13px">'
    + '<button class="btn-action on-light primary" onclick="confirmReward(\'' + category + '\',\'' + userId + '\')">Confirm</button>'
    + '<button class="btn-action on-light" onclick="openRewardForm=null;renderRewards();">Cancel</button>'
    + '</div><div id="reward-error-' + category + '-' + userId + '" style="font-size:11px;color:var(--red);margin-top:6px"></div>'
    + '</div>';
}

function memberRow(m, category) {
  const pointsKey = category + '_points';
  const formOpen = openRewardForm && openRewardForm.category === category && openRewardForm.userId === m.user_id;
  const name = escHtml(((m.first_name || '') + ' ' + (m.last_name || '')).trim() || 'Member');
  let html = '<div style="display:flex;align-items:center;flex-wrap:wrap;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);margin-bottom:6px;background:var(--cream-dark)">'
    + '<div style="flex:1;min-width:140px"><div style="font-weight:600;font-size:13px;color:var(--navy)">' + name + '</div><div style="font-size:11px;color:var(--muted)">' + escHtml(m.email || '') + '</div></div>'
    + '<div class="mono" style="font-weight:700;color:var(--gold);min-width:60px;text-align:right">' + (m[pointsKey] || 0) + ' pts</div>'
    + rewardButtonHtml(category, m.user_id, m.rewarded_categories, m.rewarded_notes && m.rewarded_notes[category])
    + '</div>';
  if (formOpen) html += rewardFormHtml(category, m.user_id, 'e.g. P500 Choppies voucher');
  return html;
}

function renderCategorySection(category, label) {
  const qualifiedKey = 'qualified_' + category;
  const qualified = rewardsRows.filter(function (m) { return m[qualifiedKey]; })
    .sort(function (a, b) { return (b[category + '_points'] || 0) - (a[category + '_points'] || 0); });
  const below = rewardsRows.filter(function (m) { return !m[qualifiedKey]; });

  let html = '<div class="card" style="margin-bottom:20px">'
    + '<div class="card-title">' + label + '</div>'
    + '<div class="card-subtitle">' + qualified.length + ' qualified member' + (qualified.length === 1 ? '' : 's') + ' this season.</div>';

  if (!qualified.length) {
    html += '<p style="color:var(--muted);font-size:13px">No opted-in members have reached the ' + label.toLowerCase() + ' threshold yet.</p>';
  } else {
    html += qualified.map(function (m) { return memberRow(m, category); }).join('');
  }

  if (below.length) {
    html += '<div style="margin-top:10px">'
      + '<a href="#" onclick="event.preventDefault();toggleBelowBar(\'' + category + '\')" style="font-size:12px;color:var(--muted);font-weight:600">'
      + (belowSectionsOpen[category] ? 'Hide' : 'Show') + ' below qualification bar (' + below.length + ')</a>'
      + '</div>';
    if (belowSectionsOpen[category]) {
      html += '<div style="margin-top:8px;opacity:.55">' + below.map(function (m) {
        const name = escHtml(((m.first_name || '') + ' ' + (m.last_name || '')).trim() || 'Member');
        return '<div style="display:flex;align-items:center;flex-wrap:wrap;gap:10px;padding:8px 14px;border-radius:var(--radius-sm);margin-bottom:4px;background:var(--cream-dark)">'
          + '<div style="flex:1;min-width:140px"><div style="font-size:13px;color:var(--navy)">' + name + '</div><div style="font-size:11px;color:var(--muted)">' + escHtml(m.email || '') + '</div></div>'
          + '<div class="mono" style="font-size:12px;color:var(--muted)">' + (m[category + '_points'] || 0) + ' pts</div>'
          + '</div>';
      }).join('') + '</div>';
    }
  }

  html += '</div>';
  return html;
}

function renderOverallRanking() {
  const top = rewardsRows.slice().sort(function (a, b) { return a.overall_rank - b.overall_rank; }).slice(0, 10);
  const medal = function (r) { return r === 1 ? '&#129351;' : r === 2 ? '&#129352;' : r === 3 ? '&#129353;' : null; };

  const rowsHtml = top.map(function (m) {
    const isPodium = m.overall_rank <= 3;
    const m2 = medal(m.overall_rank);
    const name = escHtml(((m.first_name || '') + ' ' + (m.last_name || '')).trim() || 'Member');
    const formOpen = openRewardForm && openRewardForm.category === 'overall' && openRewardForm.userId === m.user_id;
    let row = '<div style="display:flex;align-items:center;flex-wrap:wrap;gap:10px;padding:' + (isPodium ? '14px' : '10px') + ' 14px;border-radius:var(--radius-sm);margin-bottom:6px;background:' + (isPodium ? 'var(--cream-dark)' : 'transparent') + ';border:1px solid var(--border)">'
      + '<div style="width:32px;text-align:center;font-size:' + (isPodium ? '20px' : '14px') + ';font-weight:700;color:' + (isPodium ? 'inherit' : 'var(--muted)') + '">' + (m2 || ('#' + m.overall_rank)) + '</div>'
      + '<div style="flex:1;min-width:140px"><div style="font-weight:600;font-size:13px;color:var(--navy)">' + name + '</div><div style="font-size:11px;color:var(--muted)">' + escHtml(m.email || '') + '</div></div>'
      + '<div class="mono" style="font-weight:700;color:var(--gold);min-width:70px;text-align:right">' + (m.overall_points || 0) + ' pts</div>'
      + rewardButtonHtml('overall', m.user_id, m.rewarded_categories, m.rewarded_notes && m.rewarded_notes['overall'])
      + '</div>';
    if (formOpen) row += rewardFormHtml('overall', m.user_id, 'e.g. P1000 headline prize');
    return row;
  }).join('');

  return '<div class="card" style="margin-bottom:20px">'
    + '<div class="card-title">Overall Ranking &mdash; Top ' + top.length + '</div>'
    + '<div class="card-subtitle">Guidance: reserve headline prizes for the top 3.</div>'
    + (rowsHtml || '<p style="color:var(--muted);font-size:13px">No opted-in members yet.</p>')
    + '</div>';
}

function renderGuidancePanel() {
  return '<div class="card" style="margin-bottom:20px">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="guidanceOpen=!guidanceOpen;renderRewards();">'
    + '<div class="card-title" style="margin-bottom:0">&#128161; Key Wellness guidance</div>'
    + '<span style="font-size:12px;color:var(--muted)">' + (guidanceOpen ? 'Hide &#9650;' : 'Show &#9660;') + '</span>'
    + '</div>'
    + (guidanceOpen
        ? '<div style="margin-top:14px;font-size:13px;color:var(--text);line-height:1.7">'
          + '<p style="margin-bottom:10px">Points reflect engagement, learning, and consistency &mdash; never financial state. Nothing on this tab indicates a member&apos;s income, debt, or savings position.</p>'
          + '<p style="margin-bottom:10px"><strong>Recommended practice:</strong> recognise everyone who qualifies in a category (the threshold tier below), and reserve headline prizes for the overall top 3 (the top-N tier).</p>'
          + '<p style="margin-bottom:6px"><strong>Budget-neutral recognition ideas:</strong></p>'
          + '<ul style="margin:0 0 0 20px;color:var(--muted)"><li>A personal recognition letter from a manager or director</li><li>A half-day of leave</li><li>Small vouchers (e.g. grocery or airtime)</li></ul>'
          + '</div>'
        : '')
    + '</div>';
}

function fmtHistoryDate(iso) {
  return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function renderRewardHistory() {
  const seasonOptions = [''].concat([0, 1, 2, 3].map(quarterKey));

function renderHeadcountAffordance(s) {
  if (headcountEditing) {
    return '<div>'
      + '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'
      + '<input type="number" id="headcount-input" min="1" max="999999" value="' + (s.reported_headcount || '') + '" placeholder="e.g. 1240" style="width:110px;padding:6px 10px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:13px">'
      + '<button class="btn-action on-light primary" onclick="saveHeadcount()">Save</button>'
      + '<button class="btn-action on-light" onclick="headcountEditing=false;renderRewards();">Cancel</button>'
      + '</div>'
      + '<div id="headcount-error" style="font-size:11px;color:var(--red);margin-top:6px"></div>'
      + '</div>';
  }
  const lastUpdated = s.reported_headcount_updated_at
    ? ' <span style="color:var(--muted)">(updated ' + fmtHistoryDate(s.reported_headcount_updated_at) + ')</span>' : '';

    + '</div>';
}

async function saveHeadcount() {
  const input = document.getElementById('headcount-input');
  const errEl = document.getElementById('headcount-error');
  const val = parseInt(input && input.value, 10);
  if (!val || val <= 0 || val >= 1000000) {
    if (errEl) errEl.textContent = 'Enter a whole number greater than 0.';
    return;
  }
  const { error } = await sb.rpc('set_org_headcount', { p_headcount: val });
  if (error) {
    if (errEl) errEl.textContent = error.message;
    return;
  }
  headcountEditing = false;
  await loadRewards(rewardsSeason);
}

function renderSeasonSummary() {
  const s = rewardsSummary;
  if (!s) return '';
  const countdown = (s.days_remaining != null)
    ? ('Season closes in <strong>' + s.days_remaining + ' day' + (s.days_remaining === 1 ? '' : 's') + '</strong>') : '';

  let strip;
  if (s.reported_headcount) {
    const pct = Math.round(100 * s.org_member_count / s.reported_headcount);
    strip = '<strong>' + s.org_member_count + '</strong> of <strong>' + Number(s.reported_headcount).toLocaleString() + '</strong> employees registered ('
      + pct + '% activation, as reported by your HR team) &middot; ' + s.opted_in_count + ' opted in &middot; ' + s.active_this_season_count + ' active this season';
  } else {
    strip = '<strong>' + s.opted_in_count + '</strong> of ' + s.org_member_count + ' registered members opted in &middot; '
      + s.active_this_season_count + ' active this season';

  return '<div class="card" style="margin-bottom:20px">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:10px">'

        ? '<p style="font-size:12px;color:var(--muted);margin-top:6px">Add your employee headcount to see programme activation rates.</p>'
        : '')
    + '</div>';
}

function renderRewards() {
  const seasonOptions = [0, 1, 2, 3].map(quarterKey);
  const seasonSelect = '<select id="rewards-season" onchange="loadRewards(this.value)" style="padding:8px 12px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:13px">'
    + seasonOptions.map(function (s) { return '<option value="' + s + '"' + (s === rewardsSeason ? ' selected' : '') + '>' + (s === quarterKey(0) ? s + ' (current)' : s) + '</option>'; }).join('')
    + '</select>';

  let html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">'
    + seasonSelect
    + '<div style="display:flex;gap:8px;flex-wrap:wrap">'
    + '<button class="btn-action on-light' + (rewardsSubTab === 'categories' ? ' primary' : '') + '" onclick="switchRewardsSubTab(\'categories\')">Categories</button>'
    + '<button class="btn-action on-light' + (rewardsSubTab === 'history' ? ' primary' : '') + '" onclick="switchRewardsSubTab(\'history\')">History</button>'
    + (rewardsSubTab === 'categories' ? '<button class="btn-action on-light" onclick="exportRewardsCsv()">Export CSV</button>' : '')
    + '</div></div>';

  if (rewardsSubTab === 'history') {
    html += renderRewardHistory();
  } else if (!rewardsRows.length) {
    html += '<div class="empty-state">'
      + '<div class="empty-icon">&#127942;</div>'
      + '<h3>No one has opted in yet</h3>'
      + '<p>Encourage your team to opt in to Rewards from their Badges page in the member portal &mdash; once they do, they will appear here as they qualify in each category.</p>'
      + '</div>';
  } else {
    html += renderGuidancePanel();
    html += renderCategorySection('utilisation', 'Utilisation');
    html += renderCategorySection('learning', 'Learning');
    html += renderCategorySection('progress', 'Progress');
    html += renderOverallRanking();

function exportRewardsCsv() {
  const header = ['Name', 'Email', 'Utilisation Points', 'Learning Points', 'Progress Points', 'Overall Points', 'Overall Rank', 'Qualified Utilisation', 'Qualified Learning', 'Qualified Progress', 'Rewarded Categories'];
  const rows = [header].concat(
    rewardsRows.map(function (r) {
      return [
        ((r.first_name || '') + ' ' + (r.last_name || '')).trim(),
        r.email || '',
        r.utilisation_points || 0,
        r.learning_points || 0,
        r.progress_points || 0,
        r.overall_points || 0,
        r.overall_rank || '',
        r.qualified_utilisation ? 'Yes' : 'No',
        r.qualified_learning ? 'Yes' : 'No',
        r.qualified_progress ? 'Yes' : 'No',
        (r.rewarded_categories || []).join('; '),
      ];
    })
  );
  const csv = rows.map(function (r) {
    return r.map(function (v) {
      const s = String(v == null ? '' : v);
      return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    }).join(',');
  }).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'key-wellness-rewards-' + rewardsSeason + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── Debt Health / Retirement Readiness (org_financial_indicators) ─────
function emptyFinCard(title, fin) {
  var n = fin && fin.assessed_count != null ? fin.assessed_count : 0;
  return '<div class="card"><div class="card-title">' + title + '</div>'
    + '<p style="color:var(--muted);font-size:13px">Data appears once 5+ employees have completed assessments (' + n + ' of 5).</p></div>';
}

function finBandsHtml(bands, total, colors) {
  // Consecutive suppressed bands are merged into ONE segment (fixed width,
  // flex-grow/shrink:0) instead of one per band, rendered as a plain neutral
  // fill with a lock icon — the same privacy language as the page header's
  // "Aggregate only" badge — rather than a striped placeholder-style pattern
  // with cramped "<3" text. The tooltip and the legend below still spell out
  // exactly which bands are hidden and why.
  // Percentage bands use flex-basis:0% so their flex-grow ratio (the
  // count-derived pct) decides their share of the REMAINING space, rather
  // than the raw pct competing directly against a fixed-width sibling.
  var html = '';
  var i = 0;
  while (i < bands.length) {
    var b = bands[i];
    if (b.suppressed) {
      var run = [b];
      while (i + run.length < bands.length && bands[i + run.length].suppressed) run.push(bands[i + run.length]);
      var w = 22 + 6 * (run.length - 1);
      var runTitle = 'Fewer than 3 employees in each of: ' + run.map(function (x) { return escHtml(x.label); }).join(', ') + ' — hidden for privacy';
      html += '<div class="fin-band suppressed" style="flex:0 0 ' + w + 'px" title="' + runTitle + '">&#128274;</div>';
      i += run.length;
      continue;
    }
    var pct = total ? Math.round(100 * (b.count || 0) / total) : 0;
    if (pct) {
      html += '<div class="fin-band" style="flex:' + pct + ' 1 0%;background:' + colors[b.key] + '" title="' + escHtml(b.label) + ': ' + b.count + '">' + (pct >= 12 ? pct + '%' : '') + '</div>';
    }
    i++;
  }
  return html;
}

function finLegendHtml(bands, colors) {
  return bands.map(function (b) {
    return '<div class="fin-leg-item"><div class="fin-dot" style="background:' + colors[b.key] + '"></div><span>' + escHtml(b.label) + (b.suppressed ? ' &middot; &lt;3' : ' &middot; ' + b.count) + '</span></div>';
  }).join('');
}

// Explains the 🔒 icon wherever it appears — only shown when at least one
// band in that panel is actually suppressed, so it doesn't clutter panels
// where every band already has 3+ employees.
function finSuppressedNote(bands) {
  if (!bands.some(function (b) { return b.suppressed; })) return '';
  return '<p style="font-size:11px;color:var(--muted);margin-top:10px">&#128274; = fewer than 3 employees fall in that band. To protect individual privacy, the exact count is never shown &mdash; only that it&apos;s a very small group.</p>';
}

function renderDebtHealth(fin) {
  if (!fin || fin.eligible === false) return emptyFinCard('Debt Health', fin);
  var dti = fin.dti;
  var total = dti.reported_count || 0;
  var colors = { healthy: 'var(--green)', manageable: 'var(--gold)', strained: 'var(--orange)', over_indebted: 'var(--red)' };

  var html = '<div class="card">'
    + '<div class="card-title">Debt Health</div>'
    + '<div class="card-subtitle">Debt-to-income ratio across ' + total + ' employee' + (total === 1 ? '' : 's') + ' who reported income and debt figures. Median DTI: <strong>' + (dti.median != null ? dti.median + '%' : '&mdash;') + '</strong>.</div>';

  if (total > 0) {
    html += '<div class="fin-bands">' + finBandsHtml(dti.bands, total, colors) + '</div>'
      + '<div class="fin-legend">' + finLegendHtml(dti.bands, colors) + '</div>'
      + finSuppressedNote(dti.bands);
  } else {
    html += '<p style="color:var(--muted);font-size:13px">No employees have reported income and debt figures yet.</p>';
  }
  html += '</div>';

  if (total > 0) {
    // Suppressed bands (1-2 members) are treated as 0 here — the true count
    // never reaches the client, so the threshold check can only work off
    // what was actually disclosed.
    var strainedN = (dti.bands.filter(function (b) { return b.key === 'strained'; })[0] || {}).count || 0;
    var overN     = (dti.bands.filter(function (b) { return b.key === 'over_indebted'; })[0] || {}).count || 0;
    var riskyPct  = Math.round(100 * (strainedN + overN) / total);

    if (riskyPct >= 25) {
      html += '<div class="action-strip">'
        + '<h3>Recommended Next Step</h3>'
        + '<p><strong>' + riskyPct + '% of reporting employees</strong> are in the strained or over-indebted DTI bands. A group debt-counselling initiative would directly support this group.</p>'
        + '<div class="action-btns">'
        + '<button class="btn-action primary" onclick="requestWorkshop(\'Debt Counselling\')">Arrange group debt-counselling sessions</button>'
        + '<button class="btn-action" onclick="contactSupport()">Talk to your Key Wellness advisor</button>'
        + '</div></div>';
    } else {
      html += '<div class="notice-gold" style="margin-bottom:20px">Debt levels look manageable across your reporting workforce &mdash; no urgent action flagged.</div>';
    }
  }
  return html;
}

function renderFinancialStress(fin) {
  if (!fin || fin.eligible === false) return emptyFinCard('Financial Stress', fin);
  var st = fin.stress;
  if (!st) return ''; // older cached response shape before this indicator existed
  var total = st.reported_count || 0;
  var colors = { low: 'var(--green)', moderate: 'var(--gold)', high: 'var(--red)' };

  var html = '<div class="card">'
    + '<div class="card-title">Financial Stress</div>'
    + '<div class="card-subtitle">Self-reported stress level from ' + total + ' employee' + (total === 1 ? '' : 's') + "' most recent fortnightly check-in. Median: <strong>" + (st.median != null ? st.median + '/10' : '&mdash;') + '</strong>.</div>';

  if (total > 0) {
    html += '<div class="fin-bands">' + finBandsHtml(st.bands, total, colors) + '</div>'
      + '<div class="fin-legend">' + finLegendHtml(st.bands, colors) + '</div>'
      + finSuppressedNote(st.bands);
  } else {
    html += '<p style="color:var(--muted);font-size:13px">No employees have logged a stress check-in yet.</p>';
  }
  html += '</div>';

  if (total > 0) {
    var highN = (st.bands.filter(function (b) { return b.key === 'high'; })[0] || {}).count || 0;
    var highPct = Math.round(100 * highN / total);

    if (highPct >= 25) {
      html += '<div class="action-strip">'
        + '<h3>Recommended Next Step</h3>'
        + '<p><strong>' + highPct + '% of reporting employees</strong> are logging high financial stress. Proactive wellbeing outreach or an EAP referral would directly support this group.</p>'
        + '<div class="action-btns">'
        + '<button class="btn-action primary" onclick="requestWorkshop(\'Financial Stress Support\')">Request wellbeing outreach</button>'
        + '<button class="btn-action" onclick="contactSupport()">Talk to your Key Wellness advisor</button>'
        + '</div></div>';
    } else {
      html += '<div class="notice-gold" style="margin-bottom:20px">Reported stress levels look manageable across your workforce &mdash; no urgent action flagged.</div>';
    }
  }
  return html;
}

function renderRetirementReadiness(fin) {
  if (!fin || fin.eligible === false) return emptyFinCard('Retirement Readiness', fin);
  var ret = fin.retirement;
  var total = ret.bands.reduce(function (s, b) { return s + (b.count || 0); }, 0);
  var colors = { excellent: 'var(--green)', good: 'var(--teal)', fair: 'var(--gold)', needs_work: 'var(--orange)', critical: 'var(--red)' };

  var html = '<div class="card">'
    + '<div class="card-title">Retirement Readiness</div>'
    + '<div class="card-subtitle">Based on the retirement dimension of each employee\'s latest assessment. Median score: <strong>' + (ret.median != null ? ret.median + '/100' : '&mdash;') + '</strong>.</div>';

  if (total > 0) {
    html += '<div class="fin-bands">' + finBandsHtml(ret.bands, total, colors) + '</div>'
      + '<div class="fin-legend">' + finLegendHtml(ret.bands, colors) + '</div>'
      + finSuppressedNote(ret.bands);
  } else {
    html += '<p style="color:var(--muted);font-size:13px">No retirement dimension data available yet.</p>';
  }
  html += '</div>';

  if (total > 0) {
    var needsN = (ret.bands.filter(function (b) { return b.key === 'needs_work'; })[0] || {}).count || 0;
    var critN  = (ret.bands.filter(function (b) { return b.key === 'critical'; })[0] || {}).count || 0;
    var atRiskPct = Math.round(100 * (needsN + critN) / total);

    if (atRiskPct >= 30) {
      html += '<div class="action-strip">'
        + '<h3>Recommended Next Step</h3>'
        + '<p><strong>' + atRiskPct + '% of assessed employees</strong> fall in the needs-work or critical retirement readiness bands. A retirement-planning workshop or pension communication campaign would directly support this group.</p>'
        + '<div class="action-btns">'
        + '<button class="btn-action primary" onclick="requestWorkshop(\'Retirement Planning\')">Request a retirement-planning workshop</button>'
        + '<button class="btn-action" onclick="triggerCampaign(\'Retirement Planning\')">Trigger pension communication campaign</button>'
        + '<button class="btn-action" onclick="contactSupport()">Talk to your Key Wellness advisor</button>'
        + '</div></div>';
    } else {
      html += '<div class="notice-gold" style="margin-bottom:20px">Retirement readiness looks solid across your assessed workforce &mdash; no urgent action flagged.</div>';
    }
  }
  return html;
}

function render(data) {
  if (!data || data.suppressed) {
    renderSuppressed(data || {});
    return;
  }

  const s       = data.summary      || {};
  const f       = data.funnel       || {};
  const d       = data.distribution || {};
  const dims    = data.dimensions   || {};
  const distress = data.distress;
  const trend   = data.trend;

  const nEmp    = s.n_employees       || 0;
  const partPct = s.participation_pct || 0;
  const avg     = s.avg_score         || 0;

  // 1. Headline stats
  let html = '<div class="stat-grid">';
  html += '<div class="stat-box navy"><div class="stat-val mono">' + nEmp + '</div><div class="stat-lbl">Enrolled Employees</div></div>';
  html += '<div class="stat-box gold"><div class="stat-val mono">' + partPct + '%</div><div class="stat-lbl">Completed Assessment</div></div>';
  html += '<div class="stat-box" style="border-left-color:' + scoreBandColor(avg) + '">'
        + '<div class="stat-val mono" style="color:' + scoreBandColor(avg) + '">' + (avg || '&mdash;') + '</div>'
        + '<div class="stat-lbl">Avg Wellbeing Score</div>'
        + (avg ? '<div class="stat-delta" style="color:' + scoreBandColor(avg) + '">' + scoreBandLabel(avg) + '</div>' : '')
        + '</div>';
  if (distress && distress.pct_low_emergency_fund != null) {
    html += '<div class="stat-box orange"><div class="stat-val mono">' + distress.pct_low_emergency_fund + '%</div>'
          + '<div class="stat-lbl">Low Emergency Cover</div>'
          + '<div class="stat-delta" style="color:var(--orange)">Under 1&ndash;2 months saved</div></div>';
  }
  // Quick-glance financial indicators (full band breakdowns + recommended
  // actions still appear in their own cards further down the page).
  var fin = window._finData;
  if (fin && fin.eligible !== false) {
    if (fin.dti && fin.dti.median != null) {
      var dtiColor = fin.dti.median < 20 ? 'var(--green)' : fin.dti.median < 35 ? 'var(--gold)' : fin.dti.median < 45 ? 'var(--orange)' : 'var(--red)';
      html += '<div class="stat-box" style="border-left-color:' + dtiColor + '">'
            + '<div class="stat-val mono" style="color:' + dtiColor + '">' + fin.dti.median + '%</div>'
            + '<div class="stat-lbl">Median Debt-to-Income</div></div>';
    }
    if (fin.retirement && fin.retirement.median != null) {
      html += '<div class="stat-box" style="border-left-color:' + scoreBandColor(fin.retirement.median) + '">'
            + '<div class="stat-val mono" style="color:' + scoreBandColor(fin.retirement.median) + '">' + fin.retirement.median + '</div>'
            + '<div class="stat-lbl">Median Retirement Readiness</div></div>';
    }
    if (fin.stress && fin.stress.median != null) {
      var stressColor = fin.stress.median <= 3 ? 'var(--green)' : fin.stress.median <= 6 ? 'var(--gold)' : 'var(--red)';
      html += '<div class="stat-box" style="border-left-color:' + stressColor + '">'
            + '<div class="stat-val mono" style="color:' + stressColor + '">' + fin.stress.median + '/10</div>'
            + '<div class="stat-lbl">Median Financial Stress</div></div>';
    }
  }
  html += '</div>';

  // 2. Engagement funnel
  const signedUp  = f.signed_up            || nEmp;
  const assessed  = f.completed_assessment || 0;
  const checkedIn = f.did_checkin          || 0;
  html += '<div class="card">'
        + '<div class="card-title">Engagement Funnel</div>'
        + '<div class="card-subtitle">Where employees are in the programme &mdash; the drop-off point shows HR&apos;s highest-leverage action.</div>'
        + '<div class="funnel-list">'
        + funnelStep('Enrolled', signedUp, signedUp, 'var(--navy)')
        + funnelStep('Completed assessment', assessed, signedUp, 'var(--teal)')
        + funnelStep('Completed a check-in', checkedIn, signedUp, 'var(--gold)')
        + '</div>'
        + '<p class="funnel-note">Calculator usage is not yet tracked &mdash; that funnel step will appear in a future update.</p>'
        + '</div>';

  // 3. Workforce distribution
  const struggling = d.struggling || { pct: 0, count: 0 };
  const coping     = d.coping     || { pct: 0, count: 0 };
  const thriving   = d.thriving   || { pct: 0, count: 0 };
  const assessed2  = d.assessed_count || 0;

  if (assessed2 > 0) {
    html += '<div class="card">'
          + '<div class="card-title">Workforce Distribution</div>'
          + '<div class="card-subtitle">Across ' + assessed2 + ' employees who completed the assessment. The average score alone can mask a split workforce.</div>'
          + '<div class="dist-bands">';
    if (struggling.pct > 0) html += '<div class="dist-band struggling" style="flex:' + struggling.pct + '" title="' + struggling.pct + '% Struggling">' + (struggling.pct >= 12 ? struggling.pct + '%' : '') + '</div>';
    if (coping.pct     > 0) html += '<div class="dist-band coping"     style="flex:' + coping.pct     + '" title="' + coping.pct     + '% Coping"    >' + (coping.pct     >= 12 ? coping.pct     + '%' : '') + '</div>';
    if (thriving.pct   > 0) html += '<div class="dist-band thriving"   style="flex:' + thriving.pct   + '" title="' + thriving.pct   + '% Thriving"  >' + (thriving.pct   >= 12 ? thriving.pct   + '%' : '') + '</div>';
    html += '</div>';
    html += '<div class="dist-legend">'
          + '<div class="dist-leg-item"><div class="dist-dot" style="background:var(--red)"></div><span><strong>' + struggling.pct + '%</strong> Struggling (0&ndash;39) &middot; ' + struggling.count + ' employees</span></div>'
          + '<div class="dist-leg-item"><div class="dist-dot" style="background:var(--orange)"></div><span><strong>' + coping.pct     + '%</strong> Coping (40&ndash;64) &middot; '     + coping.count     + ' employees</span></div>'
          + '<div class="dist-leg-item"><div class="dist-dot" style="background:var(--green)"></div><span><strong>' + thriving.pct   + '%</strong> Thriving (65&ndash;100) &middot; '   + thriving.count   + ' employees</span></div>'
          + '</div></div>';
  }

  // 4. By dimension
  const dimItems    = dims.items           || [];
  const focusDimKey = dims.focus_dimension || '';

  if (dimItems.length > 0) {
    html += '<div class="card">'
          + '<div class="card-title">By Financial Dimension</div>'
          + '<div class="card-subtitle">Average across all assessed employees. The <strong style="color:var(--gold)">focus</strong> dimension has the lowest score &mdash; a targeted push here will have the greatest impact.</div>'
          + '<div class="dim-list">';
    dimItems.forEach(function(item) {
      var label   = DIM_LABELS[item.dimension] || item.dimension;
      var isFocus = item.dimension === focusDimKey;
      var pct     = Math.max(0, Math.min(100, item.avg || 0));
      html += '<div class="dim-row">'
            + '<div class="dim-label-wrap">'
            + '<span class="dim-label">' + escHtml(label) + '</span>'
            + (isFocus ? '<span class="dim-focus-tag">focus</span>' : '')
            + '</div>'
            + '<div class="dim-bar-bg"><div class="dim-bar-fill' + (isFocus ? ' focus' : '') + '" style="width:' + pct + '%"></div></div>'
            + '<div class="dim-score">' + item.avg + '</div>'
            + '</div>';
    });
    html += '</div></div>';
  }

  // 5. Distress signal (only rendered when markers are present)
  if (distress && distress.pct_low_emergency_fund != null) {
    html += '<div class="card">'
          + '<div class="card-title">Financial Resilience Signal</div>'
          + '<div class="card-subtitle">Based on self-reported emergency fund coverage from the wellness assessment.</div>'
          + '<div class="distress-band">'
          + '<div class="distress-pct">' + distress.pct_low_emergency_fund + '%</div>'
          + '<div class="distress-desc"><strong>' + distress.pct_low_emergency_fund + '% of assessed employees</strong> have emergency savings covering less than 1&ndash;2 months of essential expenses, making them financially vulnerable to unexpected shocks such as medical costs or job loss.<br><br>A savings-focused campaign or workshop would directly support this group.</div>'
          + '</div>'
          + '<p style="font-size:11px;color:var(--muted)">Based on ' + distress.n_assessed + ' employees who completed the assessment. This is a readiness band &mdash; no individual can be identified from this data.</p>'
          + '</div>';
  }

  // 5.5 Debt Health, Retirement Readiness & Financial Stress (org_financial_indicators)
  html += renderDebtHealth(window._finData);
  html += renderRetirementReadiness(window._finData);
  html += renderFinancialStress(window._finData);

  // 6. Trend chart
  html += '<div class="card">'
        + '<div class="card-title">Wellbeing Score Over Time</div>'
        + '<div class="card-subtitle">Quarterly average across all assessed workforce members.</div>'
        + '<div class="chart-wrap"><canvas id="trendChart"></canvas></div>'
        + '<p class="trend-caption">Wellbeing improvement is gradual &mdash; engagement metrics above are the leading indicator early in the programme. Score movement typically becomes visible after 2&ndash;4 quarters.</p>'
        + '</div>';

  // 7. Recommended actions
  var focusDimLabel = DIM_LABELS[focusDimKey] || focusDimKey;
  if (focusDimKey) {
    html += '<div class="action-strip">'
          + '<h3>Recommended Next Step</h3>'
          + '<p><strong>' + escHtml(focusDimLabel) + '</strong> is your workforce&apos;s lowest-scoring dimension. A targeted initiative here &mdash; a workshop, a guided coaching campaign, or a financial literacy push &mdash; will have the most impact for your team right now.</p>'
          + '<div class="action-btns">'
          + '<button class="btn-action primary" onclick="requestWorkshop(\'' + escHtml(focusDimLabel).replace(/'/g, "\\'") + '\')">Request a workshop on this topic</button>'
          + '<button class="btn-action" onclick="triggerCampaign(\'' + escHtml(focusDimLabel).replace(/'/g, "\\'") + '\')">Trigger employee campaign</button>'
          + '<button class="btn-action" onclick="contactSupport()">Talk to your Key Wellness advisor</button>'
          + '</div></div>';
  }

  document.getElementById('page-content').innerHTML = html;

  if (trend && trend.length > 0) {
    renderTrendChart(trend);
  } else {
    var wrap = document.getElementById('trendChart');
    if (wrap && wrap.parentElement) {
      wrap.parentElement.innerHTML = '<p style="text-align:center;color:var(--muted);font-size:13px;padding:48px 0">Trend will appear as assessments accumulate over time.</p>';
    }
  }
}

function funnelStep(label, count, total, color) {
  var pct = total > 0 ? Math.round(100 * count / total) : 0;
  return '<div class="funnel-step">'
       + '<div class="funnel-label-row"><span>' + escHtml(label) + '</span><span class="funnel-count">' + count + ' employees &middot; ' + pct + '%</span></div>'
       + '<div class="funnel-bar-bg"><div class="funnel-bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>'
       + '</div>';
}

function renderTrendChart(trendData) {
  var ctx = document.getElementById('trendChart');
  if (!ctx) return;
  if (trendChart) { trendChart.destroy(); trendChart = null; }
  trendChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: trendData.map(function(t){ return t.period; }),
      datasets: [{
        label: 'Avg Wellbeing Score',
        data: trendData.map(function(t){ return t.avg_score; }),
        borderColor: '#397e2b',
        backgroundColor: 'rgba(57,126,43,.08)',
        pointBackgroundColor: '#397e2b',
        pointRadius: 5,
        pointHoverRadius: 7,
        tension: 0.3,
        fill: true,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { min: 0, max: 100,
             grid: { color: '#e7e9e3' },
             ticks: { font: { family: 'DM Mono', size: 11 } } },
        x: { grid: { display: false },
             ticks: { font: { family: 'Inter', size: 11 } } }
      },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: function(ctx){ return 'Score: ' + ctx.parsed.y; } } }
      }
    }
  });
}

function renderSuppressed(data) {
  var n = data.n_employees || 0;
  document.getElementById('page-content').innerHTML =
    '<div class="empty-state">'
    + '<div class="empty-icon">&#128274;</div>'
    + '<h3>Building your dashboard</h3>'
    + '<p>Aggregate data appears once at least <strong>5 employees</strong> have enrolled, to protect individual privacy.<br><br>'
    + '<strong>' + n + ' employee' + (n === 1 ? '' : 's') + '</strong> ' + (n === 1 ? 'has' : 'have') + ' joined so far. Share your company enrolment code with your team to unlock the dashboard.</p>'
    + '<div class="notice-gold"><strong>Privacy commitment:</strong> '
    + escHtml(data.message || 'All figures are workforce aggregates. No individual scores or identifiable data is shared with employers.')
    + '</div></div>';
}

function renderError(msg) {
  document.getElementById('page-content').innerHTML =
    '<div class="empty-state">'
    + '<div class="empty-icon">&#9888;&#65039;</div>'
    + '<h3>Could not load dashboard</h3>'
    + '<p>' + escHtml(msg || 'An unexpected error occurred. Please refresh or contact support at wellness@keywellness.co.bw') + '</p>'
    + '</div>';
}

// ══════════════════════════════════════════════════════════════
//  REPORTS — published utilisation reports (HR view)
//  Renders ENTIRELY from data_snapshot / narrative already stored on the
//  row — never a live RPC call — so what HR sees is exactly what was
//  published, even if live data has since changed.
// ══════════════════════════════════════════════════════════════

let reportsRows = [];
let currentHrReport = null;

async function loadReports() {
  document.getElementById('page-content').innerHTML = '<div class="spinner"><div class="spin"></div> Loading reports&hellip;</div>';
  currentHrReport = null;
  const { data, error } = await sb.from('org_reports')
    .select('*')
    .eq('status', 'published')
    .order('period_start', { ascending: false });
  if (error) {
    renderError(error.message);
    return;
  }
  reportsRows = data || [];
  renderReportsList();
}

function fmtReportDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function renderReportsList() {
  if (!reportsRows.length) {
    document.getElementById('page-content').innerHTML =
      '<div class="empty-state">'
      + '<div class="empty-icon">&#128196;</div>'
      + '<h3>No reports published yet</h3>'
      + '<p>Your Key Wellness counsellor publishes a utilisation report each period. Once published, it will appear here.</p>'
      + '</div>';
    return;
  }
  let html = '<div class="card">'
    + '<div class="card-title">Utilisation Reports</div>'
    + '<div class="card-subtitle">Published quarterly reports for your organisation.</div>'
    + '<div class="table-wrap" style="overflow-x:auto;border-radius:8px;border:1px solid var(--border)">'
    + '<table class="rewards-table"><thead><tr><th>Period</th><th>Published</th><th></th></tr></thead><tbody>'
    + reportsRows.map(function (r) {
        return '<tr><td style="font-weight:600">' + escHtml(r.period_label) + '</td>'
          + '<td class="mono" style="font-size:12px;color:var(--muted)">' + fmtReportDate(r.published_at) + '</td>'
          + '<td><button class="btn-action on-light" onclick="openHrReport(\'' + r.id + '\')">View Report &rarr;</button></td></tr>';
      }).join('')
    + '</tbody></table></div></div>';
  document.getElementById('page-content').innerHTML = html;
}

function openHrReport(id) {
  currentHrReport = reportsRows.find(function (r) { return r.id === id; });
  if (!currentHrReport) { renderError('Could not find this report.'); return; }
  renderHrReportDetail();
}

function fmtPctHr(v) { return (v === null || v === undefined) ? '—' : v + '%'; }

function renderHrReportDetail() {
  const RC = window.KWReportCharts;
  const row = currentHrReport;
  const snap = row.data_snapshot;

  if (!snap) {
    document.getElementById('page-content').innerHTML =
      '<div class="report-list-link" style="margin-bottom:16px"><button class="btn-action on-light" onclick="renderReportsList()">&larr; Back to reports</button></div>'
      + '<div class="empty-state"><div class="empty-icon">&#9888;&#65039;</div><h3>Report data unavailable</h3>'
      + '<p>This report was published but its data snapshot could not be loaded. Please contact wellness@keywellness.co.bw.</p></div>';
    return;
  }

  const narrative = row.narrative || {};
  const funnel = snap.engagement_funnel || {};
  const sessions = snap.sessions || {};
  const kpi = snap.kpi_summary || {};
  const activities = snap.program_activities || {};
  const wellnessAreas = snap.wellness_areas || {};
  const dataCoverage = snap.data_coverage || {};
  const clientSplit = snap.client_type_split || {};
  const intensity = snap.session_intensity || {};
  const demographics = snap.demographics || {};
  const prev = snap.previous_period && !snap.previous_period.insufficient_cohort ? snap.previous_period : null;
  const prevKpi = prev ? (prev.kpi_summary || {}) : null;
  const risks = narrative.challenges_risks || [];

  let html = '<div class="report-list-link" style="margin-bottom:16px"><button class="btn-action on-light" onclick="renderReportsList()">&larr; Back to reports</button></div>';
  html += '<div class="report-doc">';

  // ── 1. Cover block ──────────────────────────────────────────
  html += '<div class="report-cover">'
    + '<div class="report-cover-brandbar"></div>'
    + '<h1>Financial Wellbeing Utilisation Report</h1>'
    + '<div class="report-cover-sub">' + escHtml(currentOrgName) + '</div>'
    + '<div class="report-cover-meta">'
    + '<div><div class="meta-label">Reporting period</div><div class="meta-val">' + escHtml(row.period_label) + '</div></div>'
    + '<div><div class="meta-label">Prepared by</div><div class="meta-val">Key Wellness</div></div>'
    + '<div><div class="meta-label">Published</div><div class="meta-val">' + fmtReportDate(row.published_at) + '</div></div>'
    + '</div></div>';

  // ── 2. Executive summary + KPI strip ─────────────────────────
  html += '<div class="report-section card">'
    + '<div class="report-section-title">Executive Summary</div>'
    + (narrative.executive_summary ? '<div class="narrative-text" style="margin:14px 0 20px">' + escHtml(narrative.executive_summary) + '</div>' : '')
    + '<div class="report-kpi-strip">'
    + '<div class="stat-box"><div class="stat-val mono">' + fmtRateHr(kpi.participation_rate) + '</div><div class="stat-lbl">Participation Rate</div>'
    + (prevKpi ? '<div class="stat-delta">' + RC.qoqBadge(RC.cellValue(kpi.participation_rate), RC.cellValue(prevKpi.participation_rate), {suffix:'pp'}) + '</div>' : '') + '</div>'
    + '<div class="stat-box green"><div class="stat-val mono">' + fmtRateHr(kpi.attendance_rate) + '</div><div class="stat-lbl">Attendance Rate</div>'
    + (prevKpi ? '<div class="stat-delta">' + RC.qoqBadge(RC.cellValue(kpi.attendance_rate), RC.cellValue(prevKpi.attendance_rate), {suffix:'pp'}) + '</div>' : '') + '</div>'
    + '<div class="stat-box gold"><div class="stat-val mono">' + (kpi.total_reach ?? '—') + '</div><div class="stat-lbl">Total Reach</div></div>'
    + '<div class="stat-box"><div class="stat-val mono">' + (kpi.total_touchpoints ?? '—') + '</div><div class="stat-lbl">Total Touchpoints</div></div>'
    + '</div></div>';

  // ── 3. Programme delivery ────────────────────────────────────
  html += '<div class="report-section card">'
    + '<div class="report-section-title">Programme Delivery</div>'
    + '<div class="report-section-sub">Delivery through both portal-booked coaching sessions and off-platform group activities.</div>'
    + '<div class="report-grid">'
    + '<div class="chart-box"><h4>Delivery Mode</h4><div class="chart-canvas-wrap"><canvas id="hr-chart-deliverymode"></canvas></div>'
    + '<div class="chart-caption">Share of sessions and activities delivered physically vs. virtually.</div></div>'
    + '<div class="chart-box"><h4>Monthly Touchpoint Trend</h4><div class="chart-canvas-wrap"><canvas id="hr-chart-touchpoints"></canvas></div>'
    + '<div class="chart-caption">Combined portal attendance and activity attendees, by month.</div></div>'
    + '</div>'
    + '<h4 style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:16px 0 10px">Off-Platform Activities</h4>'
    + RC.renderActivitiesListTable(activities.activities_list)
    + '</div>';

  // ── 4. Programme utilisation ─────────────────────────────────
  html += '<div class="report-section card">'
    + '<div class="report-section-title">Programme Utilisation</div>'
    + '<div class="report-grid">'
    + '<div class="chart-box"><h4>Engagement Funnel</h4><div class="chart-canvas-wrap"><canvas id="hr-chart-funnel"></canvas></div>'
    + '<div class="chart-caption">Where employees are in the programme, from enrolment through to attended sessions.</div></div>'
    + '<div class="chart-box"><h4>Session Intensity</h4><div class="chart-canvas-wrap"><canvas id="hr-chart-intensity"></canvas></div>'
    + '<div class="chart-caption">Clients grouped by number of sessions attended this period.</div>'
    + (RC.anySuppressed(Object.values(intensity)) ? '<div class="suppression-note">Cells under 3 are suppressed to protect confidentiality.</div>' : '') + '</div>'
    + '</div>'
    + '<div class="chart-box"><h4>Member vs. Dependent Reach</h4>'
    + '<div style="display:flex;gap:32px;padding:12px 0">'
    + '<div><div class="stat-val mono" style="font-size:24px">' + RC.cellDisplay(clientSplit.member) + '</div><div class="stat-lbl">Member sessions</div></div>'
    + '<div><div class="stat-val mono" style="font-size:24px">' + RC.cellDisplay(clientSplit.dependent) + '</div><div class="stat-lbl">Dependent sessions</div></div>'
    + '</div>'
    + '<div class="chart-caption">Dependent sessions are coaching sessions booked under an employee\'s account on behalf of a family member.</div>'
    + '</div></div>';

  // ── 5. Who we reached (demographics) ─────────────────────────
  html += '<div class="report-section card">'
    + '<div class="report-section-title">Who We Reached</div>'
    + '<div class="report-grid">'
    + '<div class="chart-box"><h4>Age Bands</h4><div class="chart-canvas-wrap"><canvas id="hr-chart-age"></canvas></div>'
    + '<div class="chart-caption">' + escHtml(demographics.gender_note || '') + '</div></div>'
    + '<div class="chart-box"><h4>Age &times; Session Intensity</h4>'
    + RC.renderDemographicsCrossTable(snap.demographics_cross)
    + '<div class="chart-caption">How engagement intensity varies by age band.</div></div>'
    + '</div>'
    + '<p class="confidentiality-line">All data is aggregated and cells under 3 are suppressed. Individual records are never shown &mdash; this protects your employees and is required under the Botswana Data Protection Act.</p>'
    + '</div>';

  // ── 6. Wellness areas addressed ──────────────────────────────
  html += '<div class="report-section card">'
    + '<div class="report-section-title">Wellness Areas Addressed</div>'
    + '<div class="chart-box"><h4>Assessment Band Distribution</h4>'
    + '<div class="chart-canvas-wrap" style="height:280px"><canvas id="hr-chart-categories"></canvas></div>'
    + '<div class="chart-caption">Employees\' latest wellness-assessment scores this period, by financial dimension.</div>'
    + '<div class="suppression-note">Cells under 3 are suppressed to protect confidentiality.</div></div>'
    + ((wellnessAreas.most_engaged || []).length ? '<div class="chart-box"><h4>Most Engaged Wellness Areas</h4>'
      + wellnessAreas.most_engaged.map(function (m) {
          return '<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:13px"><span>' + (DIM_LABELS[m.dimension] || m.dimension) + '</span><span class="mono">' + RC.cellDisplay(m.engaged_count) + '</span></div>';
        }).join('')
      + '<div class="chart-caption">Ranked by number of employees who used a related self-service tool this period.</div></div>' : '')
    + '</div>';

  // ── 7. Insights & observations ───────────────────────────────
  if (narrative.insights) {
    html += '<div class="report-section card"><div class="report-section-title">Insights &amp; Observations</div><div class="narrative-text" style="margin-top:14px">' + escHtml(narrative.insights) + '</div></div>';
  }

  // ── 8. Progress & outcomes ───────────────────────────────────
  if (narrative.progress_outcomes) {
    html += '<div class="report-section card"><div class="report-section-title">Progress &amp; Outcomes</div><div class="narrative-text" style="margin-top:14px">' + escHtml(narrative.progress_outcomes) + '</div></div>';
  }

  // ── 9. Challenges & risk register ────────────────────────────
  if (risks.length) {
    html += '<div class="report-section card"><div class="report-section-title">Challenges &amp; Risk Register</div>'
      + '<table class="risk-table"><thead><tr><th>Challenge</th><th>Severity</th><th>Impact</th><th>Mitigation</th></tr></thead><tbody>'
      + risks.map(function (r) {
          return '<tr><td>' + escHtml(r.challenge) + '</td>'
            + '<td><span class="severity-pill severity-' + (r.severity || 'low') + '">' + escHtml(r.severity || 'low') + '</span></td>'
            + '<td>' + escHtml(r.impact) + '</td><td>' + escHtml(r.mitigation) + '</td></tr>';
        }).join('')
      + '</tbody></table></div>';
  }

  // ── 10. Next steps / recommendations ─────────────────────────
  if (narrative.next_steps) {
    html += '<div class="report-section card"><div class="report-section-title">Next Steps &amp; Recommendations</div><div class="narrative-text" style="margin-top:14px">' + escHtml(narrative.next_steps) + '</div></div>';
  }

  // ── 11. Appendix — methodology & confidentiality ─────────────
  html += '<div class="report-section report-appendix">'
    + '<div class="report-section-title" style="border-bottom-color:var(--border)">Appendix &mdash; Methodology &amp; Confidentiality</div>'
    + '<h4>Data Sources</h4>'
    + '<p>Portal wellness assessments, coaching-session bookings and confirmed attendance, self-service tool usage, and counsellor-logged off-platform activities (group talks, education sessions, webinars, clinics).</p>'
    + '<h4>Snapshot Date</h4>'
    + '<p>This report reflects data captured at the moment it was published (' + fmtReportDate(row.published_at) + '). Figures do not update afterwards, even if underlying portal data later changes.</p>'
    + '<h4>Data Coverage</h4>'
    + '<p>Attendance confirmed: <strong>' + fmtPctHr(dataCoverage.attendance_confirmation_pct) + '</strong> of booked sessions &middot; Assessment completion: <strong>' + fmtRateHr(dataCoverage.assessment_completion_pct) + '</strong> of enrolled employees.<br>' + escHtml(dataCoverage.statement || '') + '</p>'
    + '<h4>Suppression Methodology</h4>'
    + '<p>Any figure representing fewer than 3 individuals is withheld and shown as "&mdash;", to prevent identifying any one employee by elimination in a small group. Where withholding a single cell in a row or column would let its value be worked out from a visible total, that total is withheld too.</p>'
    + '<h4>Aggregation Statement</h4>'
    + '<p>Every figure in this report is a workforce-level aggregate. No individual assessment answers, financial figures, scores, or names appear anywhere in this document.</p>'
    + '</div>';

  html += '</div>'; // .report-doc

  document.getElementById('page-content').innerHTML = html;

  setTimeout(function () {
    RC.renderModeSplit('hr-chart-deliverymode', mergeModeSplits(sessions.mode_split, activities.mode_split));
    RC.renderTouchpointsTrend('hr-chart-touchpoints', sessions.monthly_trend, activities.activities_list);
    RC.renderFunnel('hr-chart-funnel', funnel);
    RC.renderSessionIntensity('hr-chart-intensity', intensity);
    RC.renderAgeBands('hr-chart-age', demographics.age_bands);
    RC.renderCategoryBands('hr-chart-categories', snap.assessment_categories, DIM_LABELS);
  }, 0);

  KW.reveal('.card, .stat-box');
}

function fmtRateHr(cell) {
  if (cell === null || cell === undefined) return '—';
  const v = window.KWReportCharts.cellValue(cell);
  return v === null ? '—' : v + '%';
}

// Combines portal session-mode counts with off-platform activity mode
// counts into one delivery-mode split for the doughnut in Programme
// Delivery. Both sides are already aggregate counts (sessions' cells are
// suppression-aware, activities' are plain — activities describe events,
// never people, so they need no suppression — see BUILD-NOTES.md).
function mergeModeSplits(sessionModeSplit, activityModeSplit) {
  const RC = window.KWReportCharts;
  const merged = {};
  Object.keys(sessionModeSplit || {}).forEach(function (k) {
    const v = RC.cellValue(sessionModeSplit[k]);
    if (v === null) return;
    merged[k] = (merged[k] || 0) + v;
  });
  Object.keys(activityModeSplit || {}).forEach(function (k) {
    merged[k] = (merged[k] || 0) + (activityModeSplit[k] || 0);
  });
  return merged;
}

// Action handlers — intent only in v1, open mailto
function requestWorkshop(dimension) {
  var subject = encodeURIComponent('Workshop Request: ' + dimension);
  var body    = encodeURIComponent('Hi Key Wellness team,\n\nOur dashboard shows "' + dimension + '" is our workforce\'s lowest-scoring area.\n\nWe would like to request a targeted workshop or group session on this topic for our employees.\n\nPlease get in touch to discuss options.\n\nThank you.');
  window.open('mailto:wellness@keywellness.co.bw?subject=' + subject + '&body=' + body);
}

function triggerCampaign(dimension) {
  var subject = encodeURIComponent('Employee Campaign Request: ' + dimension);
  var body    = encodeURIComponent('Hi Key Wellness team,\n\nWe\'d like to run a targeted financial wellness campaign for our employees focused on "' + dimension + '".\n\nCould you help us set this up?\n\nThank you.');
  window.open('mailto:wellness@keywellness.co.bw?subject=' + subject + '&body=' + body);
}

function contactSupport() {
  window.open('mailto:wellness@keywellness.co.bw?subject=Employer%20Dashboard%20Enquiry');
}

async function doLogout() {
  await sb.auth.signOut();
  window.location.replace('index.html');
}

init();
</script>
