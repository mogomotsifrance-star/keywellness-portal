<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Net Worth Tracker — Key Wellness</title>
<link rel="icon" type="image/svg+xml" href="assets/img/kw-icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="kw-badges.js"></script>
<script src="kw-profile-sync.js"></script>
<script src="js/kw-reveal.js"></script>
<link rel="stylesheet" href="css/kw-theme.css">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:var(--kw-ink);--navy-light:var(--kw-green-deep);--gold:var(--kw-green);--cream:var(--kw-canvas);--cream-dark:var(--kw-surface);--white:var(--kw-white);--green:var(--kw-green);--red:var(--kw-red);--muted:var(--kw-grey);--border:var(--kw-line);--radius:var(--kw-r-lg);--radius-sm:var(--kw-r);--shadow:0 1px 3px rgba(35,38,31,.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--navy);min-height:100vh}
.topbar{background:var(--kw-navy);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{color:#fff;font-size:15px;font-weight:800}
.topbar span{color:var(--kw-yellow);font-size:11px;display:block;margin-top:2px}
.topbar a{color:rgba(255,255,255,.6);font-size:13px;text-decoration:none}.topbar a:hover{color:#fff}
.container{max-width:920px;margin:0 auto;padding:28px 20px}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:20px}
.card-title{font-size:15px;font-weight:800;margin-bottom:16px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:999px;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:'Nunito',sans-serif;transition:background-color .2s var(--kw-ease),transform .1s}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--kw-green);color:#fff}.btn-primary:hover{background:var(--kw-green-deep)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--navy)}.btn-outline:hover{border-color:var(--kw-grey)}
.btn-sm{padding:7px 14px;font-size:12px}
.btn-danger{background:var(--red);color:#fff}
.top-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.sum-box{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;text-align:center}
.sum-val{font-family:'DM Mono',monospace;font-size:26px;font-weight:500}
.sum-lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:4px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-header h3{font-size:14px;font-weight:800}
.item-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--cream);border-radius:var(--radius-sm);margin-bottom:8px}
.item-cat{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;width:80px;flex-shrink:0}
.item-name{flex:1;font-size:13px;font-weight:500}
.item-amt{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;min-width:90px;text-align:right}
.item-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:2px 4px}.item-del:hover{color:var(--red)}
.add-form{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.add-row{display:flex;gap:8px}
.add-row input,.add-row select{flex:1;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:#fff;outline:none;font-family:'Nunito',sans-serif;transition:border-color .2s var(--kw-ease),box-shadow .2s var(--kw-ease)}
.add-row input:focus,.add-row select:focus{border-color:var(--kw-green);box-shadow:0 0 0 3px var(--kw-green-tint)}
.progress-bar{background:var(--cream-dark);border-radius:999px;height:8px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:999px;transition:.4s}
.history-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.snapshot-btn{background:var(--kw-green);color:#fff;border:none;padding:9px 18px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:background-color .2s var(--kw-ease)}
.snapshot-btn:hover{background:var(--kw-green-deep)}
.notice{padding:12px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;margin-bottom:16px}
.notice-green{background:var(--kw-green-tint);border-left:4px solid var(--green);color:var(--kw-green-deep)}
.notice-red{background:#fdf2f2;border-left:4px solid var(--red);color:#7b1a1a}
.notice-gold{background:var(--kw-yellow-tint);border-left:4px solid var(--kw-yellow);color:var(--kw-yellow-ink)}
@media(max-width:640px){.two-col{grid-template-columns:1fr}.top-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="topbar">
  <div><h1>💎 Net Worth Tracker</h1><span>Key Wellness Financial Tools</span></div>
  <a href="index.html#dashboard">← Back to Portal</a>
</div>

<div class="container">

<!-- ── Back + User ── -->
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
  <button onclick="window.location.href='index.html#dashboard'" style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:999px;border:1px solid var(--kw-line);background:transparent;color:var(--kw-ink);font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit" onmouseover="this.style.borderColor='#397e2b';this.style.color='#397e2b'" onmouseout="this.style.borderColor='#e7e9e3';this.style.color='#23261f'">← Back to Portal</button>
  <div style="display:flex;align-items:center;gap:10px">
    <div id="tool-user-initial" style="width:32px;height:32px;background:#397e2b;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;color:#fff;flex-shrink:0">?</div>
    <div id="tool-user-name" style="font-size:.82rem;font-weight:600;color:#23261f">Loading…</div>
  </div>
</div>

  <div class="top-grid">
    <div class="sum-box">
      <div class="sum-val" id="s-assets" style="color:var(--green)">P0</div>
      <div class="sum-lbl">Total Assets</div>
    </div>
    <div class="sum-box">
      <div class="sum-val" id="s-liabilities" style="color:var(--red)">P0</div>
      <div class="sum-lbl">Total Liabilities</div>
    </div>
    <div class="sum-box">
      <div class="sum-val" id="s-networth">P0</div>
      <div class="sum-lbl">Net Worth</div>
    </div>
  </div>

  <div id="notice-area"></div>

  <div class="card" style="margin-bottom:20px">
    <div class="card-title">Net Worth Breakdown</div>
    <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:4px">
      <span style="color:var(--green)">Assets</span>
      <span id="ratio-label" style="color:var(--muted)">—</span>
      <span style="color:var(--red)">Liabilities</span>
    </div>
    <div class="progress-bar" style="height:14px">
      <div class="progress-fill" id="asset-bar" style="background:var(--green);width:50%"></div>
    </div>
  </div>

  <div class="two-col">
    <!-- ASSETS -->
    <div class="card">
      <div class="section-header">
        <h3 style="color:var(--green)">✅ Assets</h3>
        <span class="sum-val" id="total-assets" style="font-size:16px;color:var(--green)">P0</span>
      </div>
      <div id="assets-list"></div>
      <div class="add-form">
        <div class="add-row">
          <select id="asset-cat">
            <option value="Cash & Savings">Cash & Savings</option>
            <option value="Investments">Investments</option>
            <option value="Property">Property</option>
            <option value="Vehicle">Vehicle</option>
            <option value="Retirement Fund">Retirement Fund</option>
            <option value="Business">Business</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="add-row">
          <input type="text" id="asset-name" placeholder="Description (e.g. Savings account)">
          <input type="number" id="asset-amt" placeholder="Value (BWP)" min="0">
          <button class="btn btn-primary btn-sm" onclick="addAsset()">Add</button>
        </div>
      </div>
    </div>

    <!-- LIABILITIES -->
    <div class="card">
      <div class="section-header">
        <h3 style="color:var(--red)">⚠️ Liabilities</h3>
        <span class="sum-val" id="total-liabilities" style="font-size:16px;color:var(--red)">P0</span>
      </div>
      <div id="liabilities-list"></div>
      <div class="add-form">
        <div class="add-row">
          <select id="liab-cat">
            <option value="Mortgage">Mortgage</option>
            <option value="Car Loan">Car Loan</option>
            <option value="Credit Card">Credit Card</option>
            <option value="Personal Loan">Personal Loan</option>
            <option value="Student Loan">Student Loan</option>
            <option value="Other Debt">Other Debt</option>
          </select>
        </div>
        <div class="add-row">
          <input type="text" id="liab-name" placeholder="Description (e.g. Home loan)">
          <input type="number" id="liab-amt" placeholder="Balance owed (BWP)" min="0">
          <button class="btn btn-danger btn-sm" onclick="addLiability()">Add</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SNAPSHOT HISTORY -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="card-title" style="margin:0">📅 Net Worth History</div>
      <button class="snapshot-btn" onclick="takeSnapshot()">📸 Save Snapshot</button>
    </div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px">Save a monthly snapshot to track your net worth over time.</p>
    <div id="history-list"></div>
  </div>

</div>

<script>
let data = JSON.parse(localStorage.getItem('kw_networth_v1') || '{"assets":[],"liabilities":[],"history":[]}');

function save(){
  localStorage.setItem('kw_networth_v1', JSON.stringify(data));
  (async()=>{
    if(!window._toolSb||!window._toolUser)return;
    const{error}=await window._toolSb.from('tool_data').upsert({user_id:window._toolUser.id,tool:'net_worth_tracker',data,updated_at:new Date().toISOString()},{onConflict:'user_id,tool'});
    if(error)console.error('net_worth_tracker save failed:',error);
    // Offer to write computed asset/liability totals back to shared profile
    const totalAssets = data.assets.reduce((s,a)=>s+Number(a.amt||0),0);
    const totalLiabs  = data.liabilities.reduce((s,l)=>s+Number(l.amt||0),0);
    if (totalAssets > 0 || totalLiabs > 0) {
      const changes = [
        { col: 'total_assets',      newVal: totalAssets },
        { col: 'total_liabilities', newVal: totalLiabs  },
      ];
      const ok = await KWProfile.confirm(changes);
      if (ok) await KWProfile.writeBack(changes);
    }
  })();
}
function fmt(n){ return (n<0?'-':'')+'P'+Math.abs(Math.round(n)).toLocaleString(); }

function addAsset(){
  const cat  = document.getElementById('asset-cat').value;
  const name = document.getElementById('asset-name').value.trim();
  const amt  = parseFloat(document.getElementById('asset-amt').value)||0;
  if(!name||!amt) return;
  data.assets.push({cat,name,amt,id:Date.now()});
  document.getElementById('asset-name').value='';
  document.getElementById('asset-amt').value='';
  save(); render();
}

function addLiability(){
  const cat  = document.getElementById('liab-cat').value;
  const name = document.getElementById('liab-name').value.trim();
  const amt  = parseFloat(document.getElementById('liab-amt').value)||0;
  if(!name||!amt) return;
  data.liabilities.push({cat,name,amt,id:Date.now()});
  document.getElementById('liab-name').value='';
  document.getElementById('liab-amt').value='';
  save(); render();
}

function deleteItem(type, id){
  data[type] = data[type].filter(i=>i.id!==id);
  save(); render();
}

function takeSnapshot(){
  const ta = data.assets.reduce((s,i)=>s+i.amt,0);
  const tl = data.liabilities.reduce((s,i)=>s+i.amt,0);
  const nw = ta - tl;
  const snap = {date: new Date().toISOString(), assets:ta, liabilities:tl, netWorth:nw};
  data.history.unshift(snap);
  if(data.history.length>24) data.history.pop();
  save(); render();
  alert('Snapshot saved! Net Worth: '+fmt(nw));
}

function render(){
  const ta = data.assets.reduce((s,i)=>s+i.amt,0);
  const tl = data.liabilities.reduce((s,i)=>s+i.amt,0);
  const nw = ta - tl;

  KW.countUp(document.getElementById('s-assets'), ta, { format: fmt });
  KW.countUp(document.getElementById('s-liabilities'), tl, { format: fmt });
  const nwEl = document.getElementById('s-networth');
  KW.countUp(nwEl, nw, { format: fmt });
  nwEl.style.color = nw>=0 ? 'var(--green)' : 'var(--red)';

  document.getElementById('total-assets').textContent = fmt(ta);
  document.getElementById('total-liabilities').textContent = fmt(tl);

  // Bar
  const total = ta + tl;
  const assetPct = total > 0 ? Math.round((ta/total)*100) : 50;
  document.getElementById('asset-bar').style.width = assetPct+'%';
  document.getElementById('ratio-label').textContent = assetPct+'% assets · '+(100-assetPct)+'% liabilities';

  // Notice
  const na = document.getElementById('notice-area');
  if(ta>0||tl>0){
    if(nw>0) na.innerHTML=`<div class="notice notice-green">✅ Positive net worth of ${fmt(nw)}. Your assets exceed your liabilities.</div>`;
    else if(nw<0) na.innerHTML=`<div class="notice notice-red">⚠️ Negative net worth of ${fmt(Math.abs(nw))}. Focus on reducing debt and building assets.</div>`;
    else na.innerHTML=`<div class="notice notice-gold">📊 Net worth is zero. Start building assets or paying down debt.</div>`;
  } else { na.innerHTML=''; }

  // Assets list
  const al = document.getElementById('assets-list');
  if(!data.assets.length){ al.innerHTML='<div style="font-size:12px;color:var(--muted);padding:8px 0">No assets added yet.</div>'; }
  else { al.innerHTML = data.assets.map(i=>`
    <div class="item-row">
      <span class="item-cat">${i.cat}</span>
      <span class="item-name">${i.name}</span>
      <span class="item-amt" style="color:var(--green)">${fmt(i.amt)}</span>
      <button class="item-del" onclick="deleteItem('assets',${i.id})">✕</button>
    </div>`).join(''); }

  // Liabilities list
  const ll = document.getElementById('liabilities-list');
  if(!data.liabilities.length){ ll.innerHTML='<div style="font-size:12px;color:var(--muted);padding:8px 0">No liabilities added yet.</div>'; }
  else { ll.innerHTML = data.liabilities.map(i=>`
    <div class="item-row">
      <span class="item-cat">${i.cat}</span>
      <span class="item-name">${i.name}</span>
      <span class="item-amt" style="color:var(--red)">${fmt(i.amt)}</span>
      <button class="item-del" onclick="deleteItem('liabilities',${i.id})">✕</button>
    </div>`).join(''); }

  // History
  const hl = document.getElementById('history-list');
  if(!data.history.length){ hl.innerHTML='<div style="font-size:13px;color:var(--muted)">No snapshots yet. Click "Save Snapshot" to record your current net worth.</div>'; }
  else { hl.innerHTML = data.history.map((s,i)=>{
    const prev = data.history[i+1];
    const change = prev ? s.netWorth - prev.netWorth : null;
    const d = new Date(s.date);
    return `<div class="history-row">
      <span style="color:var(--muted)">${d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</span>
      <span style="font-family:'DM Mono',monospace;font-size:13px;color:var(--muted)">Assets: ${fmt(s.assets)} · Debt: ${fmt(s.liabilities)}</span>
      <span style="font-family:'DM Mono',monospace;font-weight:600;color:${s.netWorth>=0?'var(--green)':'var(--red)'}">${fmt(s.netWorth)}${change!==null?` <span style="font-size:11px;color:${change>=0?'var(--green)':'var(--red)'}">(${change>=0?'+':''}${fmt(change)})</span>`:''}</span>
    </div>`;
  }).join(''); }
}

// Enter key
['asset-name','asset-amt'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')addAsset()}));
['liab-name','liab-amt'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')addLiability()}));

render();
KW.reveal('.card, .sum-box');

// ── Auth init ──
(function() {
  const _SB_URL = 'https://tarmpqxsabbehgjaonfz.supabase.co';
  const _SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhcm1wcXhzYWJiZWhnamFvbmZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MjA2MjQsImV4cCI6MjA5NzA5NjYyNH0.Em-NvJVY_geHk6UOTxnpINgUw669V8W_9YvAi_koX9U';
  const _sb = window.supabase.createClient(_SB_URL, _SB_KEY);
  window._toolSb = _sb;
  _sb.auth.getSession().then(async ({ data: { session } }) => {
    if (!session) { window.location.href = 'index.html'; return; }
    window._toolUser = session.user;
    _sb.from('profiles').select('first_name, last_name, monthly_income').eq('id', session.user.id).maybeSingle().then(({ data }) => {
      window._toolProfile = data;
      if (data) {
        const name = [data.first_name, data.last_name].filter(Boolean).join(' ');
        window._toolFullName = name || session.user.email;
        const nameEl = document.getElementById('tool-user-name');
        const initEl = document.getElementById('tool-user-initial');
        if (nameEl) nameEl.textContent = window._toolFullName;
        if (initEl) initEl.textContent = (window._toolFullName)[0].toUpperCase();
      }
    });
    const { data: toolRow } = await _sb.from('tool_data').select('data').eq('user_id', session.user.id).eq('tool', 'net_worth_tracker').maybeSingle();
    if (toolRow?.data) { data = toolRow.data; render(); KW.reveal('.card, .sum-box'); }
  });
})();
</script>
</body>
</html>
